<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IEO GEK CHING</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Helvetica,Arial,sans-serif;
height:100vh;
overflow:hidden;
background:#000;
}

.hero{

position:relative;

height:100vh;

background-image:url("gallery.jpg");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

}

.overlay{

position:absolute;

inset:0;

background:rgba(0,0,0,.35);

}

.content{

position:relative;

text-align:center;

color:white;

z-index:2;

}

h1{

font-size:68px;

font-weight:300;

letter-spacing:12px;

margin-bottom:15px;

}

p{

font-size:20px;

letter-spacing:4px;

margin-bottom:40px;

}

.button{

display:inline-block;

padding:16px 40px;

border:1px solid white;

color:white;

text-decoration:none;

letter-spacing:3px;

transition:.3s;

}

.button:hover{

background:white;

color:black;

}

</style>

</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">

<h1>IEO GEK CHING</h1>

<p>Artist</p>

<a href="#" class="button">ENTER PORTFOLIO</a>

</div>

</section>

</body>

</html>
